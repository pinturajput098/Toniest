<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyush Earn Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .balance-card { background: #2c2c2c; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #0088cc; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; margin: 10px 0; }
        .btn:active { background: #006699; }
    </style>
</head>
<body>
    <h2>💰 Piyush's Earning App</h2>
    
    <div class="balance-card">
        <p>Current Balance</p>
        <h1 id="balance">$0.0000</h1>
    </div>

    <button class="btn" onclick="watchAd()">📺 Watch Ad & Earn</button>
    <button class="btn" onclick="tg.showAlert('Minimum withdraw is $2.00')">💸 Withdraw Fund</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // TERA NAYA UPDATED LINK
        const backendURL = "https://bra-friday-approval-std.trycloudflare.com";
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345;

        // Balance Load Karo
        async function loadBalance() {
            try {
                const response = await fetch(`${backendURL}/get_balance?user_id=${userId}`);
                const data = await response.json();
                document.getElementById('balance').innerText = `$${data.balance.toFixed(4)}`;
            } catch (e) { console.log("Load error"); }
        }

        // Reward Add Karo
        async function watchAd() {
            tg.showConfirm("Watch ad to earn $0.001?", async (ok) => {
                if (ok) {
                    try {
                        const res = await fetch(`${backendURL}/add_reward`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ user_id: userId })
                        });
                        if (res.ok) {
                            tg.showAlert("Reward Added!");
                            loadBalance();
                        }
                    } catch (e) { tg.showAlert("Server Error! Check if Termux is running."); }
                }
            });
        }

        loadBalance();
    </script>
</body>
</html>
