<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyush USDT Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; }
        .header { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); 
            padding: 40px 20px; 
            border-bottom-left-radius: 35px; 
            border-bottom-right-radius: 35px; 
            text-align: center; 
        }
        .balance-amount { font-size: 42px; font-weight: bold; }
        .card { background: #1e1e1e; border-radius: 25px; padding: 25px; margin-top: 20px; border: 1px solid #333; text-align: center; }
        .ad-btn { background: #00d2ff; color: black; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* Refer Section Styles */
        .refer-section { margin-top: 20px; background: #252525; padding: 15px; border-radius: 15px; border: 1px dashed #3a7bd5; }
        .refer-title { color: #00d2ff; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .refer-link-box { background: #111; padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all; color: #888; margin-bottom: 10px; border: 1px solid #333; }
        .copy-btn { background: #3a7bd5; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        
        #timer { color: #ff4757; font-weight: bold; margin-top: 15px; display: none; }
        .withdraw-link { display: block; margin-top: 15px; color: #2ecc71; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 12px; opacity: 0.8; letter-spacing: 1px;">MY BALANCE</div>
        <div class="balance-amount" id="balance">$0.0000</div>
    </div>

    <div class="container">
        <div class="card">
            <button class="ad-btn" id="adBtn" onclick="watchAd()">📺 WATCH AD & EARN</button>
            <div id="timer">Wait <span id="seconds">15</span>s...</div>
            <div class="withdraw-link" onclick="handleWithdraw()">📤 Withdraw Funds</div>
        </div>

        <div class="refer-section">
            <div class="refer-title">👥 Refer & Earn $0.03</div>
            <div class="refer-link-box" id="refLink">Loading link...</div>
            <button class="copy-btn" onclick="copyLink()">📋 Copy Refer Link</button>
        </div>

        <div style="font-size: 11px; color: #555; text-align: center; margin-top: 20px;">
            Daily Limit: 200 Ads | Min Withdraw: $2
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let currentBalance = 0.0000;

        // 1. User ka ID nikaalna aur link generate karna
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "0000";
        let botUsername = "Toniest_bot"; // <--- Yahan apne bot ka username daal (bina @ ke)
        let referLink = "https://t.me/" + botUsername + "?start=" + userId;
        
        document.getElementById('refLink').innerText = referLink;

        function copyLink() {
            navigator.clipboard.writeText(referLink);
            tg.showAlert("Link Copy Ho Gaya! Ab doston ko bhejo.");
        }

        function watchAd() {
            window.open("https://omg10.com/4/10904851", "_blank");
            let btn = document.getElementById('adBtn');
            btn.disabled = true;
            document.getElementById('timer').style.display = 'block';
            let sec = 15;
            let timer = setInterval(() => {
                sec--;
                document.getElementById('seconds').innerText = sec;
                if (sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer').style.display = 'none';
                    btn.disabled = false;
                    currentBalance += 0.001;
                    document.getElementById('balance').innerText = "$" + currentBalance.toFixed(4);
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 1000);
        }

        function handleWithdraw() {
            tg.showAlert("Minimum $2 withdrawal required.");
        }
    </script>
</body>
</html>
